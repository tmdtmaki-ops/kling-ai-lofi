name: AI Affiliate Auto-Pilot 2026 Modern-SDK

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        # Nâng cấp lên thư viện google-genai mới nhất của năm 2026
        run: pip install -q google-genai

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          import sys

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              if not api_key:
                  print("❌ Error: Missing GEMINI_API_KEY")
                  sys.exit(1)

              # Khởi tạo Client theo cú pháp mới của năm 2026
              client = genai.Client(api_key=api_key)
              
              task = "Viết mã HTML/CSS Landing Page cho KLING AI ngách nhạc Lofi. Chỉ trả về code HTML, không giải thích."
              
              # Sử dụng model Gemini 2.0 Flash hiện đại nhất
              response = client.models.generate_content(
                  model='gemini-2.0-flash',
                  contents=task
              )
              
              if not response.text:
                  print("❌ Error: No content returned")
                  sys.exit(1)

              clean_html = response.text.replace('```html', '').replace('```', '').strip()

              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(clean_html)
              
              print("✅ Website updated successfully with Gemini 2.0 SDK.")

          except Exception as e:
              print(f"❌ System Error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "AI Auto-update [Modern SDK 2026]"
            git push
          fi
