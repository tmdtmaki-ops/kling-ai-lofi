name: AI Affiliate Auto-Pilot 2026 Optimized

on:
  workflow_dispatch: 

# Ép toàn bộ quy trình sử dụng Node.js 24 để xóa cảnh báo
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -q google-generativeai

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<EOF
          import os
          import google.generativeai as genai
          import sys

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              if not api_key:
                  print("❌ LỖI: Không tìm thấy GEMINI_API_KEY trong Secrets!")
                  sys.exit(1)

              genai.configure(api_key=api_key)
              model = genai.GenerativeModel('gemini-1.5-flash')

              prompt = "Viết mã HTML/CSS Landing Page cho KLING AI ngách nhạc Lofi. CHỈ trả về code, KHÔNG giải thích, KHÔNG dùng dấu ngoặc ```."
              
              response = model.generate_content(prompt)
              
              if not response.text:
                  print("❌ LỖI: Gemini không trả về nội dung!")
                  sys.exit(1)

              content = response.text.strip()
              # Loại bỏ markdown nếu AI cố tình thêm vào
              if content.startswith("```"):
                  content = "\n".join(content.split("\n")[1:-1]).replace("html", "")

              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print("✅ Thành công: Đã tạo file index.html mới.")

          except Exception as e:
              print(f"❌ LỖI HỆ THỐNG: {str(e)}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "Không có thay đổi."
          else
            git commit -m "AI cập nhật website [Auto-Pilot]"
            git push
          fi
