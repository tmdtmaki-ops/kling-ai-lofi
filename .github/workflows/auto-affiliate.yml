name: AI Affiliate Auto-Pilot 2026 Stable

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -q google-generativeai

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Chú ý: Dấu nháy đơn quanh 'EOF' là chìa khóa sửa lỗi
        run: |
          python - <<'EOF'
          import os
          import google.generativeai as genai
          import sys

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              if not api_key:
                  print("Error: Missing GEMINI_API_KEY")
                  sys.exit(1)

              genai.configure(api_key=api_key)
              model = genai.GenerativeModel('gemini-1.5-flash')

              # Dùng chuỗi f-string đơn giản để tránh lỗi xuống dòng
              task = "Viết mã HTML/CSS Landing Page cho KLING AI ngách nhạc Lofi. Chỉ trả về code HTML, không giải thích."
              
              response = model.generate_content(task)
              if not response or not response.text:
                  sys.exit(1)

              raw_html = response.text.strip()
              
              # Làm sạch mã: Xóa bỏ các thẻ markdown ```html nếu có
              clean_html = raw_html.replace('```html', '').replace('```', '').strip()

              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(clean_html)
              
              print("File index.html created successfully.")

          except Exception as e:
              print(f"System Error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "AI Auto-update [v2026.stable]"
            git push
          fi
