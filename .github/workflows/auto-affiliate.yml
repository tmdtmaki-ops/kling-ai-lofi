name: AI Affiliate Auto-Pilot 2026 UI-Master

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        run: pip install -q google-genai

      - name: Run AI Agent UI-Designer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          import sys
          import re

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key)
              
              model_id = 'gemini-2.5-flash' 
              
              # Câu lệnh (Prompt) được thiết kế lại để ép AI viết CSS chuyên nghiệp
              task = """Hãy đóng vai một chuyên gia UI/UX. Viết mã HTML cho Landing Page KLING AI.
              YÊU CẦU BẮT BUỘC:
              1. Phải có thẻ <style> bên trong <head> với CSS hiện đại (Glassmorphism, Dark mode).
              2. Sử dụng font chữ Google Fonts (như Inter hoặc Montserrat).
              3. Nội dung tập trung vào playlist 'Deep Focus Lofi 2026'.
              4. Phải có nút bấm (CTA) đẹp mắt, có hiệu ứng hover.
              5. Trả về DUY NHẤT một khối mã bắt đầu từ <!DOCTYPE html>."""

              print(f"🚀 Đang thiết kế giao diện cao cấp với: {model_id}...")
              
              response = client.models.generate_content(
                  model=model_id,
                  contents=task
              )
              
              if response.text:
                  raw_content = response.text.strip()
                  
                  # Kỹ thuật trích xuất linh hoạt hơn
                  if "<!DOCTYPE html>" in raw_content:
                      final_html = raw_content[raw_content.find("<!DOCTYPE html>"):raw_content.rfind("</html>")+7]
                  else:
                      final_html = raw_content.replace('```html', '').replace('```', '').strip()
                  
                  with open('index.html', 'w', encoding='utf-8') as f:
                      f.write(final_html)
                  print("✅ Đã xuất bản trang web đầy đủ CSS!")
              else:
                  sys.exit(1)

          except Exception as e:
              print(f"❌ Lỗi: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "UI Upgrade: Full CSS and Modern Design"
            git push
          fi
