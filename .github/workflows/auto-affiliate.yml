name: AI Affiliate Auto-Pilot 2026 Resilient

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        run: pip install -q google-genai

      - name: Run AI Agent with Retry Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import time
          from google import genai
          import sys

          def run_task():
              api_key = os.environ.get('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key)
              
              # Danh sách các model để thử (nếu cái này hết quota thì thử cái kia)
              models_to_try = ['gemini-2.0-flash', 'gemini-1.5-flash']
              
              task = "Viết mã HTML/CSS Landing Page cho KLING AI ngách nhạc Lofi. Chỉ trả về code HTML, không giải thích."

              for model_name in models_to_try:
                  for attempt in range(3): # Thử lại tối đa 3 lần cho mỗi model
                      try:
                          print(f"🚀 Đang thử dùng model: {model_name} (Lần thử {attempt + 1})...")
                          response = client.models.generate_content(
                              model=model_name,
                              contents=task
                          )
                          
                          if response.text:
                              clean_html = response.text.replace('```html', '').replace('```', '').strip()
                              with open('index.html', 'w', encoding='utf-8') as f:
                                  f.write(clean_html)
                              print(f"✅ Thành công với model: {model_name}")
                              return True
                      except Exception as e:
                          if "429" in str(e):
                              print(f"⚠️ Hết hạn mức cho {model_name}. Đang đợi 30s...")
                              time.sleep(30)
                          else:
                              print(f"❌ Lỗi khác: {e}")
                              break # Chuyển sang model tiếp theo
              return False

          if not run_task():
              print("❌ Hệ thống đã thử mọi cách nhưng Google từ chối do hết hạn mức miễn phí.")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "AI Auto-update [Resilient Mode]"
            git push
          fi
