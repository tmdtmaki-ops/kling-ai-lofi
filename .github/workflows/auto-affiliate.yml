name: AI Affiliate Auto-Pilot 2026 Golden-Fix

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        run: pip install -q google-genai

      - name: Run AI Agent 2026
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          import sys
          import re

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key)
              
              model_id = 'gemini-2.5-flash' 
              
              task = """Viết mã HTML/CSS Landing Page chuyên nghiệp cho KLING AI. 
              Gắn liền với playlist 'Deep Focus Lofi 2026'. 
              Yêu cầu trả về đầy đủ các thẻ: <!DOCTYPE html>, <html>, <head>, <body>."""

              print(f"🚀 Triển khai thiết kế với: {model_id}...")
              
              response = client.models.generate_content(
                  model=model_id,
                  contents=task
              )
              
              if response.text:
                  raw_content = response.text.strip()
                  
                  # KỸ THUẬT VÀNG: Chỉ lấy nội dung nằm giữa <!DOCTYPE html> và </html>
                  # Điều này giúp loại bỏ hoàn toàn các ký tự lạ hoặc code block bên ngoài
                  match = re.search(r'(<!DOCTYPE html>.*?</html>)', raw_content, re.DOTALL | re.IGNORECASE)
                  
                  if match:
                      final_html = match.group(1)
                  else:
                      # Nếu không tìm thấy thẻ chuẩn, dùng biện pháp làm sạch dự phòng
                      final_html = re.sub(r'^```html\s*|^```\s*|```\s*$', '', raw_content, flags=re.MULTILINE)
                  
                  with open('index.html', 'w', encoding='utf-8') as f:
                      f.write(final_html.strip())
                  print("✅ Đã trích xuất HTML sạch thành công!")
              else:
                  sys.exit(1)

          except Exception as e:
              print(f"❌ Lỗi: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Golden Fix: Pure HTML Extraction"
            git push
          fi
