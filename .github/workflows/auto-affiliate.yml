name: AI Affiliate Auto-Pilot 2026 Ultimatum

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        run: pip install -q google-genai

      - name: Run AI Agent UI-Master
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          import sys
          import datetime

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key)
              
              model_id = 'gemini-2.5-flash' 
              
              # Prompt cực gắt: Ép AI viết giao diện ĐẸP và có CSS
              task = """Viết mã HTML Landing Page giới thiệu KLING AI. 
              YÊU CẦU BẮT BUỘC: 
              1. Phải có phần <style> chứa CSS làm giao diện ĐẸP, HIỆN ĐẠI, MÀU SẮC CHILL kiểu LOFI.
              2. Nội dung tiếng Việt, tập trung vào playlist 'Deep Focus Lofi 2026'.
              3. Chỉ trả về mã HTML, không giải thích."""

              print(f"🚀 Đang ép xung thiết kế...")
              
              response = client.models.generate_content(model=model_id, contents=task)
              
              if response.text:
                  now = datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S")
                  content = response.text.strip()
                  # Làm sạch markdown
                  clean_html = content.replace('```html', '').replace('```', '').strip()
                  
                  # Thêm timestamp vào cuối file để ép GitHub cập nhật
                  final_code = clean_html + f"\n"
                  
                  with open('index.html', 'w', encoding='utf-8') as f:
                      f.write(final_code)
                  print("✅ Đã tạo file mới có kèm mốc thời gian.")
              else:
                  sys.exit(1)
          except Exception as e:
              print(f"❌ Lỗi: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          git commit -m "UI Forced Update: $(date)"
          git push
