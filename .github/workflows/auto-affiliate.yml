name: AI Affiliate Auto-Pilot 2026 Perfect-Build

on:
  workflow_dispatch: 

# ĐẶT BIẾN Ở ĐÂY: Cấp độ toàn cầu để ép toàn bộ runner dùng Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        run: pip install -q google-genai

      - name: Run AI Agent 2026
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          import sys
          import re

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key)
              
              # Dùng model mạnh nhất trong danh sách khả dụng của bạn
              model_id = 'gemini-2.5-flash' 
              
              # Gắn ngữ cảnh playlist nhạc của bạn vào để AI viết nội dung chuẩn hơn
              task = """Viết mã HTML/CSS Landing Page chuyên nghiệp cho công cụ KLING AI. 
              Mục tiêu: Dành cho những người muốn tạo video loop cho playlist 'Deep Focus Lofi 2026 - Nhạc Tập Trung Học Tập & Làm Việc'. 
              Yêu cầu: CHỈ trả về code HTML, KHÔNG giải thích, KHÔNG dùng dấu ```."""

              print(f"🚀 Triển khai thiết kế với: {model_id}...")
              
              response = client.models.generate_content(
                  model=model_id,
                  contents=task
              )
              
              if response.text:
                  raw_content = response.text.strip()
                  # Xóa Markdown an toàn để không hỏng thẻ <html>
                  clean_content = re.sub(r'^```html\s*|^```\s*|```\s*$', '', raw_content, flags=re.MULTILINE)
                  
                  with open('index.html', 'w', encoding='utf-8') as f:
                      f.write(clean_content.strip())
                  print("✅ Build hoàn tất!")
              else:
                  sys.exit(1)

          except Exception as e:
              print(f"❌ Lỗi: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Clean Build: Node 24 compliant"
            git push
          fi
