name: AI Affiliate Auto-Pilot Pro-Edition

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        run: pip install -q google-genai

      - name: Run AI Agent Pro
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          import sys
          import time

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key)
              
              # Dùng Gemini 1.5 Pro - Thông minh hơn, phù hợp với tài khoản Pro của bạn
              # Nếu 1.5 Pro bận, nó sẽ tự động thử lại sau 30s
              model_name = 'gemini-1.5-pro'
              
              task = "Viết mã HTML/CSS Landing Page chuyên nghiệp cho KLING AI ngách nhạc Lofi. CHỈ trả về code, KHÔNG giải thích."

              print(f"🚀 Khởi động Gemini Pro để xây dựng Landing Page...")
              
              response = client.models.generate_content(
                  model=model_name,
                  contents=task
              )
              
              if response and response.text:
                  clean_html = response.text.replace('```html', '').replace('```', '').strip()
                  with open('index.html', 'w', encoding='utf-8') as f:
                      f.write(clean_html)
                  print(f"✅ Tuyệt vời! Gemini Pro đã hoàn thành bản thiết kế.")
              else:
                  print("❌ Lỗi: Model không trả về nội dung.")
                  sys.exit(1)

          except Exception as e:
              if "429" in str(e):
                  print("⚠️ Hạn mức API đang tạm nghẽn. Hãy đợi 1 phút rồi nhấn 'Run workflow' lại nhé!")
              else:
                  print(f"❌ System Error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "AI Pro Auto-update"
            git push
          fi
