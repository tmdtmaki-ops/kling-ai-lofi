name: AI Affiliate Auto-Pilot 2026 Final-Fixed

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        run: pip install -q google-genai

      - name: Run AI Agent Smart-Mode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          import sys

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key)
              
              # Thử dùng tên model đầy đủ theo chuẩn 2026
              # Nếu lỗi, script sẽ báo danh sách model khả dụng
              model_id = 'gemini-1.5-pro' 
              
              task = "Viết mã HTML/CSS Landing Page chuyên nghiệp cho KLING AI ngách nhạc Lofi. CHỈ trả về code, KHÔNG giải thích."

              print(f"🚀 Đang gọi Gemini với Model ID: {model_id}...")
              
              response = client.models.generate_content(
                  model=model_id,
                  contents=task
              )
              
              if response.text:
                  content = response.text.strip()
                  # Làm sạch code
                  if content.startswith("```"):
                      content = "\n".join(content.split("\n")[1:-1]).replace("html", "")
                  
                  with open('index.html', 'w', encoding='utf-8') as f:
                      f.write(content)
                  print("✅ Thành công rực rỡ! Trang web đã được cập nhật.")
              else:
                  print("❌ Gemini trả về kết quả trống.")
                  sys.exit(1)

          except Exception as e:
              print(f"❌ Lỗi: {e}")
              print("\n🔍 ĐANG KIỂM TRA DANH SÁCH MODEL KHẢ DỤNG CHO BẠN...")
              try:
                  # Đoạn mã thám tử: Liệt kê các model bạn thực sự có quyền dùng
                  for m in client.models.list():
                      print(f" > Model khả dụng: {m.name}")
              except:
                  pass
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "AI Auto-Pilot: Final Fix 2026"
            git push
          fi
