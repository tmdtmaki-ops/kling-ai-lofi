name: AI Affiliate Auto-Pilot 2026 Ultimate

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modern Gemini SDK
        run: pip install -q google-genai

      - name: Run AI Agent 2026
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          from google import genai
          import sys

          try:
              api_key = os.environ.get('GEMINI_API_KEY')
              client = genai.Client(api_key=api_key)
              
              # Sử dụng model ID chính xác từ danh sách khả dụng của bạn
              # Chúng ta ưu tiên 2.5-flash vì nó ổn định và hiện đại
              model_id = 'gemini-2.5-flash' 
              
              task = "Viết mã HTML/CSS Landing Page chuyên nghiệp cho KLING AI ngách nhạc Lofi. CHỈ trả về code, KHÔNG giải thích."

              print(f"🚀 Đang triệu hồi sức mạnh từ: {model_id}...")
              
              response = client.models.generate_content(
                  model=model_id,
                  contents=task
              )
              
              if response.text:
                  content = response.text.strip()
                  # Làm sạch mã HTML khỏi các ký tự Markdown
                  if content.startswith("```"):
                      content = "\n".join(content.split("\n")[1:-1]).replace("html", "")
                  
                  with open('index.html', 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f"✅ Thành công! Website đã được nâng cấp bởi {model_id}.")
              else:
                  print("❌ Lỗi: Gemini trả về kết quả rỗng.")
                  sys.exit(1)

          except Exception as e:
              print(f"❌ Lỗi hệ thống: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          if git diff --staged --quiet; then
            echo "Không có thay đổi để cập nhật."
          else
            git commit -m "AI Auto-Pilot: Deploying via Gemini 2.5 Flash"
            git push
          fi
