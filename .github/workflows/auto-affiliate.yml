name: AI Affiliate Auto-Pilot 2026

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # Quan trọng: Cấp quyền ghi để Bot có thể tự lưu file vào kho của bạn
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Nâng cấp lên v4 để hỗ trợ Node mới

      - name: Set up Python
        uses: actions/setup-python@v5 # Nâng cấp lên v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install google-generativeai

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<EOF
          import os
          import google.generativeai as genai

          try:
              genai.configure(api_key=os.environ['GEMINI_API_KEY'])
              model = genai.GenerativeModel('gemini-1.5-flash')

              prompt = """Viết mã HTML/CSS cho một Landing Page chuyên nghiệp về KLING AI dành cho ngách Nhạc Lofi. 
              Chỉ trả về mã code, không dùng các dấu ngoặc ``` hay chữ 'html' ở đầu/cuối."""

              response = model.generate_content(prompt)
              content = response.text.strip()

              # Xử lý nếu AI vẫn trả về markdown
              if content.startswith("```"):
                  content = "\n".join(content.split("\n")[1:-1])

              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print("Xử lý file index.html thành công!")
          except Exception as e:
              print(f"Lỗi rồi: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Gemini-AI-Bot"
          git config --global user.email "bot@google.ai"
          git add index.html
          # Kiểm tra xem có gì thay đổi không trước khi commit để tránh lỗi
          if git diff --staged --quiet; then
            echo "Không có thay đổi nào để cập nhật."
          else
            git commit -m "AI tự động cập nhật Landing Page [v2026]"
            git push
          fi
